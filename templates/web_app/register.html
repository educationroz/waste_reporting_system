{% extends 'web_app/base.html' %}
{% load static %}

{% block title %}Register — Waste Collection{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light py-4">
    <div class="card shadow-sm" style="width:440px">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <img src="{% static 'web_app/image/SafhaSahar.png' %}" alt="Logo" width="100" height="100" class="d-inline-block align-text-top me-2">
                <h4 class="mt-2 fw-bold">Create Account</h4>
            </div>

            <div id="error-alert" class="alert alert-danger d-none"></div>
            <div id="success-alert" class="alert alert-success d-none"></div>

            <div class="row">
                <div class="col-6 mb-3">
                    <label class="form-label">Username *</label>
                    <input type="text" id="username" class="form-control" autofocus>
                </div>
                <div class="col-6 mb-3">
                    <label class="form-label">Email *</label>
                    <input type="email" id="email" class="form-control">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Phone</label>
                <input type="tel" id="phone" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">Role *</label>
                <select id="role" class="form-select">
                    <option value="user">Regular User</option>
                    {% comment %} <option value="driver">Driver</option> {% endcomment %}
                </select>
            </div>
            <div class="row">
                <div class="col-6 mb-3">
                    <label class="form-label">Password *</label>
                    <div class="position-relative">
                        <input type="password" id="password" class="form-control pe-5" oninput="handlePasswordInput()">
                        <i class="bi bi-eye position-absolute top-50 end-0 translate-middle-y me-3 text-muted"
                            id="toggle-password-icon" style="cursor: pointer; display: none;" onclick="togglePassword()"></i>
                    </div>
                </div>
                <div class="col-6 mb-3">
                    <label class="form-label">Confirm Password *</label>
                    <div class="position-relative">
                        <input type="password" id="password2" class="form-control pe-5" oninput="handlePassword2Input()">
                        <i class="bi bi-eye position-absolute top-50 end-0 translate-middle-y me-3 text-muted"
                            id="toggle-password2-icon" style="cursor: pointer; display: none;" onclick="togglePassword2()"></i>
                    </div>
                </div>
            </div>

            <button class="btn btn-success w-100" onclick="doRegister()">
                <span id="reg-text">Create Account</span>
                <span id="reg-spinner" class="spinner-border spinner-border-sm d-none ms-2"></span>
            </button>

            <p class="text-center mt-3 mb-0 small">
                Already have an account? <a href="{% url 'login' %}" class="text-success">Sign in</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<style>
    /* ब्राउजरहरूको आफ्नै डिफल्ट रिभिल/क्लियर बटन पूर्ण रूपमा फाल्न */
    input::-webkit-reveal,
    input::-webkit-clear-button {
        display: none !important;
    }

    input::-ms-reveal,
    input::-ms-clear {
        display: none !important;
    }
</style>

<script>
async function doRegister() {
    const errDiv = document.getElementById('error-alert');
    const sucDiv = document.getElementById('success-alert');
    const spinner = document.getElementById('reg-spinner');
    const text = document.getElementById('reg-text');
    errDiv.classList.add('d-none');
    sucDiv.classList.add('d-none');

    const payload = {
        username: document.getElementById('username').value.trim(),
        email: document.getElementById('email').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        role: document.getElementById('role').value,
        password: document.getElementById('password').value,
        password2: document.getElementById('password2').value,
    };

    if (!payload.username || !payload.email || !payload.password) {
        errDiv.textContent = 'Username, email and password are required.';
        errDiv.classList.remove('d-none');
        return;
    }

    spinner.classList.remove('d-none');
    text.textContent = 'Creating...';

    try {
        const res = await fetch('/auth/register/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
        });
        const data = await res.json();

        if (res.ok) {
            localStorage.setItem('access_token', data.access);
            localStorage.setItem('refresh_token', data.refresh);
            sucDiv.textContent = 'Account created! Redirecting...';
            sucDiv.classList.remove('d-none');

            // Create Django session so LoginRequiredMixin works
            await fetch('/auth/session-login/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken'),
                },
                body: JSON.stringify({
                    username: payload.username,
                    password: payload.password,
                }),
            });

            const role = data.user?.role || 'user';
            const redirectMap = {
                admin: '/admin-dashboard/',
                driver: '/driver-dashboard/',
                user: '/',
            };
            setTimeout(() => window.location.href = redirectMap[role] || '/', 1000);
        } else {
            const msgs = Object.entries(data).map(([k,v]) => `${k}: ${Array.isArray(v) ? v.join(', ') : v}`).join('<br>');
            errDiv.innerHTML = msgs || 'Registration failed.';
            errDiv.classList.remove('d-none');
        }
    } catch (e) {
        errDiv.textContent = 'Network error: ' + e.message;
        errDiv.classList.remove('d-none');
    } finally {
        spinner.classList.add('d-none');
        text.textContent = 'Create Account';
    }
}

function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        document.cookie.split(';').forEach(cookie => {
            const c = cookie.trim();
            if (c.startsWith(name + '=')) {
                cookieValue = decodeURIComponent(c.slice(name.length + 1));
            }
        });
    }
    return cookieValue;
}

// Enter key थिच्दा अर्को इनपुट फिल्डमा फोकस लैजाने लोजिक
const fieldOrder = ['username', 'email', 'phone', 'role', 'password', 'password2'];

fieldOrder.forEach((id, idx) => {
    const el = document.getElementById(id);
    if (el) {
        el.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                e.preventDefault();
                const nextId = fieldOrder[idx + 1];
                if (nextId) {
                    document.getElementById(nextId).focus();
                } else {
                    doRegister();
                }
            }
        });
    }
});

// पहिलो Password फिल्डको लागि Eye Icon कन्ट्रोल
function handlePasswordInput() {
    const pwdInput = document.getElementById('password');
    const icon = document.getElementById('toggle-password-icon');
    if (pwdInput.value.length > 0) {
        icon.style.display = 'block';
    } else {
        icon.style.display = 'none';
    }
}

function togglePassword() {
    const pwdInput = document.getElementById('password');
    const icon = document.getElementById('toggle-password-icon');
    if (pwdInput.type === 'password') {
        pwdInput.type = 'text';
        icon.classList.remove('bi-eye');
        icon.classList.add('bi-eye-slash');
    } else {
        pwdInput.type = 'password';
        icon.classList.remove('bi-eye-slash');
        icon.classList.add('bi-eye');
    }
}

// दोस्रो (Confirm) Password फिल्डको लागि Eye Icon कन्ट्रोल
function handlePassword2Input() {
    const pwdInput = document.getElementById('password2');
    const icon = document.getElementById('toggle-password2-icon');
    if (pwdInput.value.length > 0) {
        icon.style.display = 'block';
    } else {
        icon.style.display = 'none';
    }
}

function togglePassword2() {
    const pwdInput = document.getElementById('password2');
    const icon = document.getElementById('toggle-password2-icon');
    if (pwdInput.type === 'password') {
        pwdInput.type = 'text';
        icon.classList.remove('bi-eye');
        icon.classList.add('bi-eye-slash');
    } else {
        pwdInput.type = 'password';
        icon.classList.remove('bi-eye-slash');
        icon.classList.add('bi-eye');
    }
}
</script>
{% endblock %}

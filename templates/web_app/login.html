{% extends 'web_app/base.html' %}
{% load static %}
{% block title %}Login — Waste Collection{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
    <div class="card shadow-sm" style="width:400px">
        <div class="card-body p-4">
            {% csrf_token %}
            <div class="text-center mb-4">
                 <img src="{% static 'web_app/image/SafhaSahar.png' %}" alt="Logo" width="100" height="100" class="d-inline-block align-text-top me-2">
                <h4 class="mt-2 fw-bold">Sign In</h4>
                <p class="text-muted small">Waste Collection System</p>
            </div>

            <div id="error-alert" class="alert alert-danger d-none"></div>

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" id="username" class="form-control" placeholder="Enter username" autofocus required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="position-relative">
                    <input type="password" id="password" class="form-control pe-5" placeholder="Enter password" required
                        oninput="handlePasswordInput()">
                    <i class="bi bi-eye position-absolute top-50 end-0 translate-middle-y me-3 text-muted" 
                        id="toggle-password-icon" style="cursor: pointer; display: none;" onclick="togglePassword()"></i>
                </div>
            </div>
            <button class="btn btn-success w-100" id="login-btn" onclick="doLogin()">
                <span id="login-text">Sign In</span>
                <span id="login-spinner" class="spinner-border spinner-border-sm d-none ms-2"></span>
            </button>

            <p class="text-center mt-3 mb-0 small">
                Don't have an account? <a href="{% url 'register' %}" class="text-success">Register</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<style>
    /* Chrome, Safari, र modern Edge मा ब्राउजरको आफ्नै eye button लुकाउन */
    input::-webkit-reveal,
    input::-webkit-clear-button {
        display: none !important;
    }

    /* Old Edge र IE को लागि */
    input::-ms-reveal,
    input::-ms-clear {
        display: none !important;
    }
</style>

<script>
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        document.cookie.split(';').forEach(cookie => {
            const c = cookie.trim();
            if (c.startsWith(name + '=')) {
                cookieValue = decodeURIComponent(c.slice(name.length + 1));
            }
        });
    }
    return cookieValue;
}

async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errDiv = document.getElementById('error-alert');
    const btn = document.getElementById('login-btn');
    const spinner = document.getElementById('login-spinner');
    const text = document.getElementById('login-text');

    errDiv.classList.add('d-none');
    if (!username || !password) {
        errDiv.textContent = 'Username and password required.';
        errDiv.classList.remove('d-none');
        return;
    }

    btn.disabled = true;
    spinner.classList.remove('d-none');
    text.textContent = 'Signing in...';

    try {
        const res = await fetch('/auth/login/', {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken'),
            },
            body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        console.log('Login response:', data);

        if (res.ok) {
            localStorage.setItem('access_token', data.access);
            localStorage.setItem('refresh_token', data.refresh);
    
            // Django session login
            await fetch('/auth/session-login/', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken'),
                },
                body: JSON.stringify({ username, password }),
            });

            const role = data.user?.role || '';
            const redirectMap = { admin: '/admin-dashboard/', driver: '/driver-dashboard/', user: '/' };
            window.location.href = redirectMap[role] || '/dashboard/';
        } else {
            errDiv.textContent = data.detail || JSON.stringify(data);
            errDiv.classList.remove('d-none');
        }
    } catch(e) {
        errDiv.textContent = 'Network error: ' + e.message;
        errDiv.classList.remove('d-none');
    } finally {
        btn.disabled = false;
        spinner.classList.add('d-none');
        text.textContent = 'Sign In';
    }
}

// Enter थिच्दा अर्को फिल्डमा फोकस लैजान
document.getElementById('username').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
        e.preventDefault();
        document.getElementById('password').focus();
    }
});

document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
});

// पासवर्ड टाइप गर्दा Bootstrap Icon देखाउने/लुकाउने (सुधारिएको)
function handlePasswordInput() {
    const pwdInput = document.getElementById('password');
    const icon = document.getElementById('toggle-password-icon');
    if (pwdInput.value.length > 0) {
        icon.style.display = 'block'; 
    } else {
        icon.style.display = 'none'; 
    }
}

// शो/हाइड कगल गर्ने फङ्सन
function togglePassword() {
    const pwdInput = document.getElementById('password');
    const icon = document.getElementById('toggle-password-icon');
    if (pwdInput.type === 'password') {
        pwdInput.type = 'text';
        icon.classList.remove('bi-eye');
        icon.classList.add('bi-eye-slash');
    } else {
        pwdInput.type = 'password';
        icon.classList.remove('bi-eye-slash');
        icon.classList.add('bi-eye');
    }
}
</script>
{% endblock %}

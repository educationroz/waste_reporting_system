{% extends 'web_app/base.html' %}
{% block title %}Login — Waste Management{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
    <div class="card shadow-sm" style="width:400px">
        <div class="card-body p-4">
            {% csrf_token %}
            <div class="text-center mb-4">
                <i class="bi bi-recycle text-success" style="font-size:2.5rem"></i>
                <h4 class="mt-2 fw-bold">Sign In</h4>
                <p class="text-muted small">Waste Management System</p>
            </div>

            <div id="error-alert" class="alert alert-danger d-none"></div>

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" id="username" class="form-control" placeholder="Enter username" autofocus required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control" placeholder="Enter password" required>
            </div>
            <button class="btn btn-success w-100" id="login-btn" onclick="doLogin()">
                <span id="login-text">Sign In</span>
                <span id="login-spinner" class="spinner-border spinner-border-sm d-none ms-2"></span>
            </button>

            <p class="text-center mt-3 mb-0 small">
                Don't have an account? <a href="{% url 'register' %}" class="text-success">Register</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        document.cookie.split(';').forEach(cookie => {
            const c = cookie.trim();
            if (c.startsWith(name + '=')) {
                cookieValue = decodeURIComponent(c.slice(name.length + 1));
            }
        });
    }
    return cookieValue;
}

async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errDiv = document.getElementById('error-alert');
    const btn = document.getElementById('login-btn');
    const spinner = document.getElementById('login-spinner');
    const text = document.getElementById('login-text');

    errDiv.classList.add('d-none');
    if (!username || !password) {
        errDiv.textContent = 'Username and password required.';
        errDiv.classList.remove('d-none');
        return;
    }

    btn.disabled = true;
    spinner.classList.remove('d-none');
    text.textContent = 'Signing in...';

    try {
        const res = await fetch('/auth/login/', {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken'),  // ← added
            },
            body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        console.log('Login response:', data); // ← helps debug

        if (res.ok) {
            localStorage.setItem('access_token', data.access);
            localStorage.setItem('refresh_token', data.refresh);
    
    // Also create Django session so LoginRequiredMixin works
            await fetch('/auth/session-login/', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken'),
                },
                body: JSON.stringify({ username, password }),
            });

            const role = data.user?.role || '';
            const redirectMap = { admin: '/admin-dashboard/', driver: '/driver-dashboard/', user: '/dashboard/' };
            window.location.href = redirectMap[role] || '/dashboard/';
}else {
            errDiv.textContent = data.detail || JSON.stringify(data);
            errDiv.classList.remove('d-none');
        }
    } catch(e) {
        errDiv.textContent = 'Network error: ' + e.message;
        errDiv.classList.remove('d-none');
    } finally {
        btn.disabled = false;
        spinner.classList.add('d-none');
        text.textContent = 'Sign In';
    }
}

document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
});
</script>
{% endblock %}
